version: '3.9'

services:
  # ──────────────────────────────────────────────
  # PostgreSQL – shared database for all services
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: traffic_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-traffic_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-traffic_pass}
      POSTGRES_DB: ${POSTGRES_DB:-traffic_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-traffic_user}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - traffic_network

  # ──────────────────────────────────────────────
  # Authentication Service
  # ──────────────────────────────────────────────
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: traffic_auth
    restart: unless-stopped
    env_file:
      - ./services/auth-service/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-traffic_user}:${POSTGRES_PASSWORD:-traffic_pass}@postgres:5432/auth_db?schema=public
    ports:
      - '3001:3001'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/api/v1/health >/dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - traffic_network

  vehicle-service:
    build:
      context: ./services/vehicle-service
      dockerfile: Dockerfile
    container_name: traffic_vehicle
    restart: unless-stopped
    env_file:
      - ./services/vehicle-service/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-traffic_user}:${POSTGRES_PASSWORD:-traffic_pass}@postgres:5432/vehicle_db?schema=public
    ports:
      - '3002:3002'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3002/api/v1/health >/dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - traffic_network

  traffic-service:
    build:
      context: ./services/traffic-service
      dockerfile: Dockerfile
    container_name: traffic_traffic
    restart: unless-stopped
    env_file:
      - ./services/traffic-service/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-traffic_user}:${POSTGRES_PASSWORD:-traffic_pass}@postgres:5432/traffic_db?schema=public
    ports:
      - '3003:3003'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3003/api/v1/health >/dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - traffic_network

  incident-service:
    build:
      context: ./services/incident-service
      dockerfile: Dockerfile
    container_name: traffic_incident
    restart: unless-stopped
    env_file:
      - ./services/incident-service/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-traffic_user}:${POSTGRES_PASSWORD:-traffic_pass}@postgres:5432/incident_db?schema=public
      NOTIFICATION_SERVICE_URL: http://notification-service:3005
    ports:
      - '3004:3004'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3004/api/v1/health >/dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    networks:
      - traffic_network

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: traffic_notification
    restart: unless-stopped
    env_file:
      - ./services/notification-service/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-traffic_user}:${POSTGRES_PASSWORD:-traffic_pass}@postgres:5432/notification_db?schema=public
    ports:
      - '3005:3005'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3005/api/v1/health >/dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - traffic_network

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: traffic_gateway
    restart: unless-stopped
    env_file:
      - ./services/api-gateway/.env
    environment:
      AUTH_SERVICE_URL: http://auth-service:3001
      VEHICLE_SERVICE_URL: http://vehicle-service:3002
      TRAFFIC_SERVICE_URL: http://traffic-service:3003
      INCIDENT_SERVICE_URL: http://incident-service:3004
      NOTIFICATION_SERVICE_URL: http://notification-service:3005
    ports:
      - '4000:4000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4000/health >/dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      auth-service:
        condition: service_healthy
      vehicle-service:
        condition: service_healthy
      traffic-service:
        condition: service_healthy
      incident-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    networks:
      - traffic_network

volumes:
  postgres_data:
    driver: local

networks:
  traffic_network:
    driver: bridge
